# iseeiape Automation System - Cron Schedule
#
# This file contains the cron schedule for the automation system.
# To install, run: crontab automation-cron.conf
#
# Schedule explanation:
# * * * * * command to execute
# │ │ │ │ │
# │ │ │ │ └── day of week (0-6, 0=Sunday)
# │ │ │ └──── month (1-12)
# │ │ └────── day of month (1-31)
# │ └──────── hour (0-23)
# └────────── minute (0-59)

# Environment
SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/matrix/.npm-global/bin
HOME=/home/matrix
MAILTO=matrix

# Automation Pipeline - Run every 2 hours during trading hours (8 AM - 10 PM UTC)
# This generates fresh content and posts scheduled tweets
0 */2 8-22 * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && ./run-automation.sh

# Market Data Refresh - Run every hour
# Updates market data more frequently for accurate content
30 * * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && node content/automation/cron-scheduler.js --step data

# Content Generation - Run every 4 hours
# Generates fresh content based on latest market data
0 */4 * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && node content/automation/cron-scheduler.js --step content

# Twitter Posting - Run every 30 minutes
# Checks for scheduled posts and posts them
*/30 * * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && node content/automation/cron-scheduler.js --step twitter

# Article Generation - Run once per day at 3 AM UTC
# Generates long-form articles for the website
0 3 * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && node content/automation/cron-scheduler.js --step articles

# System Health Check - Run daily at 2 AM UTC
# Checks system status and sends notifications if needed
0 2 * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && node content/automation/health-check.js 2>/dev/null || true

# Log Rotation - Run weekly on Sunday at 1 AM UTC
# Compresses old logs to save space
0 1 * * 0 find /home/matrix/.openclaw/workspace/iseeiape-website/content/automation/logs -name "*.log" -mtime +7 -exec gzip {} \;

# Backup Schedule - Run daily at 4 AM UTC
# Backs up important data
0 4 * * * cd /home/matrix/.openclaw/workspace/iseeiape-website && tar -czf /tmp/iseeiape-backup-$(date +\%Y\%m\%d).tar.gz neo-crypto/data/ content/automation/archive/ 2>/dev/null || true